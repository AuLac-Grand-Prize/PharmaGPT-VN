name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install light deps (torch/FlagEmbedding/qdrant are lazy-imported)
        run: |
          python -m pip install -U pip
          pip install fastapi "pydantic>=2" pydantic-settings httpx structlog tiktoken pytest pytest-asyncio pytest-cov
          pip install -e . --no-deps
      - name: Run tests
        run: pytest -q
